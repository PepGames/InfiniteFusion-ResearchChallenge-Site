<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion Research Tool</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>
  <main class="app">
    <section class="panel">
        <h2>Fusion Researcher Challenge</h2>
        <div class="field-row">
          <label for="run-name">Run Name</label>
          <input id="run-name" type="text" placeholder="Enter run name" />
        </div>
        <div class="button-row">
          <button id="save-run-name-btn">Save Run Name</button>
          <button id="new-run-btn">New Run</button>
          <button id="export-run-btn">Export Run</button>
          <label class="import-label" for="import-run-input">Import Run</label>
          <input id="import-run-input" type="file" accept=".json" />
        </div>
    </section>

    <nav class="tab-bar" aria-label="Main sections">
      <button class="tab-button active" data-tab="dashboard">Dashboard</button>
      <button class="tab-button" data-tab="achievements">Achievements</button>
      <button class="tab-button" data-tab="shop">Shop</button>
    </nav>

    <section class="tab-panel active" id="tab-dashboard">
      

      <section class="panel fusion-flower-panel">
        <div class="fusion-flower-rp-chip" aria-label="Available research points">
          <span class="fusion-flower-rp-label">Research Points</span>
          <span class="fusion-flower-rp-value rp-available-display">0</span>
        </div>

        <div class="fusion-flower-stage">
          <div class="fusion-flower" aria-label="Run resource overview">

            <div class="petal-card petal-top">
              <div class="petal-anim-wrap">
                <svg class="petal-svg petal-fusions" viewBox="0 0 300 400" aria-hidden="true">
                  <defs>
                    <linearGradient id="petalGradientFusion" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="var(--petal-top)"></stop>
                      <stop offset="55%" stop-color="var(--petal-mid)"></stop>
                      <stop offset="100%" stop-color="var(--petal-bottom)"></stop>
                    </linearGradient>
                    <linearGradient id="petalHighlightFusion" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"></stop>
                      <stop offset="100%" stop-color="rgba(255,255,255,0)"></stop>
                    </linearGradient>
                  </defs>

                  <path d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="url(#petalGradientFusion)"></path>
                  <path d="M150 318 Q78 278 60 198 Q60 128 98 74 Q124 38 150 58 Q176 38 202 74 Q240 128 240 198 Q222 278 150 318 Z"
                        fill="url(#petalHighlightFusion)"
                        opacity="0.1"></path>
                  <path d="M88 112 Q150 72 212 112"
                        fill="none"
                        stroke="rgba(0,0,0,0.10)"
                        stroke-width="4"
                        stroke-linecap="round"></path>
                  <path d="M74 170 Q150 128 226 170"
                        fill="none"
                        stroke="rgba(0,0,0,0.08)"
                        stroke-width="3"
                        stroke-linecap="round"></path>
                  <path d="M150 62 L150 292"
                        fill="none"
                        stroke="rgba(255,255,255,0.12)"
                        stroke-width="2"
                        stroke-linecap="round"></path>
                  <path class="petal-outline"
                        d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="none"
                        stroke-width="10"
                        stroke-linejoin="round"
                        stroke-linecap="round"></path>
                  <path
                    d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                    fill="none"
                    stroke="rgba(0,0,0,0.06)"
                    stroke-width="6"
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    transform="translate(150 200) scale(0.94) translate(-150 -200)"
                  ></path>
                </svg>

                <div class="petal-content">
                  <div class="petal-label">Fusions<br>Discovered</div>
                  <div class="petal-value" id="fusions-discovered-value">0</div>
                </div>
              </div>
            </div>

            <div class="petal-card petal-left">
              <div class="petal-anim-wrap">
                <svg class="petal-svg petal-catches" viewBox="0 0 300 400" aria-hidden="true">
                  <defs>
                    <linearGradient id="petalGradientCatch" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="var(--petal-top)"></stop>
                      <stop offset="55%" stop-color="var(--petal-mid)"></stop>
                      <stop offset="100%" stop-color="var(--petal-bottom)"></stop>
                    </linearGradient>
                    <linearGradient id="petalHighlightCatch" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"></stop>
                      <stop offset="100%" stop-color="rgba(255,255,255,0)"></stop>
                    </linearGradient>
                  </defs>

                  <path d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="url(#petalGradientCatch)"></path>
                  <path d="M150 318 Q78 278 60 198 Q60 128 98 74 Q124 38 150 58 Q176 38 202 74 Q240 128 240 198 Q222 278 150 318 Z"
                        fill="url(#petalHighlightCatch)"
                        opacity="0.1"></path>
                  <path d="M88 112 Q150 72 212 112"
                        fill="none"
                        stroke="rgba(0,0,0,0.10)"
                        stroke-width="4"
                        stroke-linecap="round"></path>
                  <path d="M74 170 Q150 128 226 170"
                        fill="none"
                        stroke="rgba(0,0,0,0.08)"
                        stroke-width="3"
                        stroke-linecap="round"></path>
                  <path d="M150 62 L150 292"
                        fill="none"
                        stroke="rgba(255,255,255,0.12)"
                        stroke-width="2"
                        stroke-linecap="round"></path>
                  <path class="petal-outline"
                        d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="none"
                        stroke-width="10"
                        stroke-linejoin="round"
                        stroke-linecap="round"></path>
                  <path
                    d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                    fill="none"
                    stroke="rgba(0,0,0,0.06)"
                    stroke-width="6"
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    transform="translate(150 200) scale(0.94) translate(-150 -200)"
                  ></path>
                </svg>

                <div class="petal-content">
                  <div class="petal-label">Catches<br>Available</div>
                  <div class="petal-value" id="catches-available-value">0</div>
                </div>
              </div>
            </div>

            <div class="petal-card petal-right">
              <div class="petal-anim-wrap">
                <svg class="petal-svg petal-splits" viewBox="0 0 300 400" aria-hidden="true">
                  <defs>
                    <linearGradient id="petalGradientSplit" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="var(--petal-top)"></stop>
                      <stop offset="55%" stop-color="var(--petal-mid)"></stop>
                      <stop offset="100%" stop-color="var(--petal-bottom)"></stop>
                    </linearGradient>
                    <linearGradient id="petalHighlightSplit" x1="0%" y1="0%" x2="0%" y2="100%">
                      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"></stop>
                      <stop offset="100%" stop-color="rgba(255,255,255,0)"></stop>
                    </linearGradient>
                  </defs>

                  <path d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="url(#petalGradientSplit)"></path>
                  <path d="M150 318 Q78 278 60 198 Q60 128 98 74 Q124 38 150 58 Q176 38 202 74 Q240 128 240 198 Q222 278 150 318 Z"
                        fill="url(#petalHighlightSplit)"
                        opacity="0.1"></path>
                  <path d="M88 112 Q150 72 212 112"
                        fill="none"
                        stroke="rgba(0,0,0,0.10)"
                        stroke-width="4"
                        stroke-linecap="round"></path>
                  <path d="M74 170 Q150 128 226 170"
                        fill="none"
                        stroke="rgba(0,0,0,0.08)"
                        stroke-width="3"
                        stroke-linecap="round"></path>
                  <path d="M150 62 L150 292"
                        fill="none"
                        stroke="rgba(255,255,255,0.12)"
                        stroke-width="2"
                        stroke-linecap="round"></path>
                  <path class="petal-outline"
                        d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                        fill="none"
                        stroke-width="10"
                        stroke-linejoin="round"
                        stroke-linecap="round"></path>
                  <path
                    d="M150 350 Q50 300 30 200 Q30 110 80 50 Q120 10 150 40 Q180 10 220 50 Q270 110 270 200 Q250 300 150 350 Z"
                    fill="none"
                    stroke="rgba(0,0,0,0.06)"
                    stroke-width="6"
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    transform="translate(150 200) scale(0.94) translate(-150 -200)"
                  ></path>
                </svg>

                <div class="petal-content">
                  <div class="petal-label">Splits<br>Available</div>
                  <div class="petal-value" id="splits-available-value">0</div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <div class="achievement-progress-placeholder">
          <div class="achievement-progress-placeholder-title">Achievement Progress</div>
          <div class="achievement-progress-placeholder-text">Coming Soon</div>
        </div>
      </section>

      <section class="panel" id="debug-panel">
        <h2>Debug Menu</h2>
        <div class="button-row">
          <button id="add-earned-rp-btn">+1 Bonus RP</button>
          <button id="add-spent-rp-btn">+1 Spent RP</button>
        </div>
      </section>

      <section class="panel">
        <h2>Action Log</h2>

        <div class="action-log-scale-shell">
          <div class="action-log-scale-inner">
            <form id="action-form" class="pokemon-form">
              <div id="action-form-top-row" class="form-row form-row-1">
                <div class="field-row">
                  <label for="action-type">Action Type</label>
                  <select id="action-type">
                    <option value="catch">Catch (-1 Catch Token)</option>
                    <option value="death">Death</option>
                    <option value="fusion">Fuse</option>
                    <option value="split">Split (-1 Split Token)</option>
                    <option value="battle">Battle</option>
                  </select>
                </div>
              </div>

              <div id="action-fields"></div>

              <div class="button-row">
                <button type="submit">Log Action</button>
              </div>
            </form>

            <div class="action-controls">
              <button id="undo-action-btn">Undo</button>
              <button id="redo-action-btn">Redo</button>
            </div>

            <ul id="action-list" class="pokemon-list"></ul>
          </div>
        </div>
      </section>
    </section>

    <section class="tab-panel" id="tab-achievements">
      <section class="panel">
        <h2>Achievements</h2>

        <div class="achievements-toolbar">
          <div class="achievements-toolbar-left">
            <label for="achievement-sort">Sort By</label>
            <select id="achievement-sort">
              <option value="alphabetical">Alphabetical</option>
              <option value="tier">Rank</option>
              <option value="recent">Most Recent</option>
              <option value="progress">Progress Achieved</option>
            </select>
          </div>

          <div class="achievements-toolbar-right">
            <div class="achievement-filter-anchor">
              <button
                type="button"
                id="achievement-filter-toggle"
                class="achievement-filter-toggle-btn"
                aria-expanded="false"
                aria-controls="achievement-filter-menu"
              >
                Filters
              </button>

              <div
                id="achievement-filter-menu"
                class="achievement-filter-menu"
                hidden
              >
                <div class="achievement-filter-actions">
                  <button type="button" id="achievement-filter-all">Select All</button>
                  <button type="button" id="achievement-filter-none">Select None</button>
                </div>

                <div class="achievement-filter-grid">
                  <div class="achievement-filter-section">
                    <div class="achievement-filter-heading">Completion</div>
                    <div class="achievement-filter-options">
                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="status"
                          data-filter-value="completed"
                          checked
                        />
                        <span>Completed</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="status"
                          data-filter-value="incomplete"
                          checked
                        />
                        <span>Incomplete</span>
                      </label>
                    </div>
                  </div>

                  <div class="achievement-filter-section">
                    <div class="achievement-filter-heading">Rank</div>
                    <div class="achievement-filter-options">
                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="bronze"
                          checked
                        />
                        <span>Bronze</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="silver"
                          checked
                        />
                        <span>Silver</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="gold"
                          checked
                        />
                        <span>Gold</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="platinum"
                          checked
                        />
                        <span>Platinum</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="diamond"
                          checked
                        />
                        <span>Diamond</span>
                      </label>

                      <label class="achievement-filter-chip">
                        <input
                          type="checkbox"
                          data-filter-group="tier"
                          data-filter-value="master"
                          checked
                        />
                        <span>Master</span>
                      </label>
                    </div>
                  </div>

                  <div class="achievement-filter-section achievement-filter-section-tags">
                    <div class="achievement-filter-heading">Tags</div>
                    <div id="achievement-tag-filters" class="achievement-filter-options"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="achievements-list" class="achievement-list"></div>
      </section>
    </section>

    <section class="tab-panel" id="tab-shop">
      <section class="panel">
        <div class="shop-panel-header">
          <div>
            <h2>Shop</h2>
            <p class="subtitle">Spend RP on tokens that affect your run.</p>
          </div>

          <div class="fusion-flower-rp-chip shop-rp-chip" aria-label="Available research points">
            <span class="fusion-flower-rp-label">Research Points</span>
            <span class="fusion-flower-rp-value rp-available-display">0</span>
          </div>
        </div>

        <div id="shop-items" class="shop-item-list"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
  <div id="achievement-toast-layer" aria-live="polite" aria-atomic="false"></div>
</body>
</html>
