<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion Research Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>Fusion Research Tool</h1>
      <p class="subtitle">Local-first tracker for custom Pokémon Infinite Fusion challenge runs.</p>
    </header>

    <nav class="tab-bar" aria-label="Main sections">
      <button class="tab-button active" data-tab="dashboard">Dashboard</button>
      <button class="tab-button" data-tab="achievements">Achievements</button>
      <button class="tab-button" data-tab="shop">Shop</button>
    </nav>

    <section class="tab-panel active" id="tab-dashboard">
      <section class="panel">
        <h2>Run Info</h2>
        <div class="field-row">
          <label for="run-name">Run Name</label>
          <input id="run-name" type="text" placeholder="Enter run name" />
        </div>
        <div class="button-row">
          <button id="save-run-name-btn">Save Run Name</button>
          <button id="new-run-btn">New Run</button>
          <button id="export-run-btn">Export Run</button>
          <label class="import-label" for="import-run-input">Import Run</label>
          <input id="import-run-input" type="file" accept=".json" />
        </div>
      </section>

      <section class="panel">
        <h2>Research Points</h2>
        <div class="stat-grid">
          <div class="stat-card">
            <span class="stat-label">Earned</span>
            <span id="rp-earned" class="stat-value">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Spent</span>
            <span id="rp-spent" class="stat-value">0</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Available</span>
            <span id="rp-available" class="stat-value">0</span>
          </div>
        </div>
      </section>

      <section class="panel" id="debug-panel">
        <h2>Debug Menu</h2>
        <div class="button-row">
          <button id="add-earned-rp-btn">+1 Earned RP</button>
          <button id="add-spent-rp-btn">+1 Spent RP</button>
        </div>
      </section>

      <section class="panel">
        <h2>Action Log</h2>
        <form id="add-pokemon-form" class="pokemon-form">
          <div class="field-row">
            <label for="action-type">Action Type</label>
            <select id="action-type">
              <option value="catch">Catch Pokémon</option>
              <option value="death">Pokémon Death</option>
              <option value="fusion">Create Fusion</option>
              <option value="gym">Gym Battle</option>
            </select>
          </div>

          <div class="field-row">
            <label for="pokemon-species">Species</label>
            <input
              id="pokemon-species"
              type="text"
              list="monster-options"
              placeholder="Start typing a monster name..."
              autocomplete="off"
              required
            />
            <datalist id="monster-options"></datalist>
          </div>

          <div class="field-row">
            <label for="pokemon-route">Route / Area</label>
            <input id="pokemon-route" type="text" placeholder="e.g. Route 3" required />
          </div>

          <button type="submit">Log Action</button>
        </form>

        <ul id="pokemon-list" class="pokemon-list"></ul>
      </section>
    </section>

    <section class="tab-panel" id="tab-achievements">
      <section class="panel">
        <h2>Achievements</h2>
        <div id="achievements-list" class="achievement-list"></div>
      </section>
    </section>

    <section class="tab-panel" id="tab-shop">
      <section class="panel">
        <h2>Shop</h2>
        <p>Shop coming soon.</p>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
